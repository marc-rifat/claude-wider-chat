name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r "dist/claude-wider-chat-${{ steps.version.outputs.VERSION }}.zip" \
            manifest.json \
            content.js \
            styles.css \
            icon48.png \
            icon128.png

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Wider Chat v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: dist/claude-wider-chat-${{ steps.version.outputs.VERSION }}.zip
